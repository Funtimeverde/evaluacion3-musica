<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Escuela de Música</title>
    <style>
      :root {
        --bg: #0f172a;
        --panel: #111827;
        --text: #f8fafc;
        --accent: #38bdf8;
        --muted: #94a3b8;
      }

      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, var(--bg), #1e293b);
        color: var(--text);
      }

      .container {
        max-width: 900px;
        margin: 0 auto;
        padding: 2rem;
      }

      header {
        text-align: center;
        margin-bottom: 2rem;
      }

      .card {
        background: var(--panel);
        border-radius: 16px;
        padding: 1.5rem;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.25);
      }

      button {
        background: var(--accent);
        color: #082f49;
        border: none;
        padding: 0.8rem 1.2rem;
        border-radius: 999px;
        cursor: pointer;
        font-weight: 700;
        margin-top: 1rem;
      }

      ul {
        padding-left: 1.2rem;
        color: var(--muted);
      }

      .status {
        margin-top: 1rem;
        color: #a7f3d0;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Escuela de Música</h1>
        <p>Conecta tu frontend con una API simple hecha en Python.</p>
      </header>

      <section class="card">
        <h2>Información de la escuela</h2>
        <button id="btnCargar">Cargar datos desde la API</button>
        <div id="resultado" class="status">Esperando respuesta...</div>
        <ul id="listaCursos"></ul>
      </section>
    </div>

    <script>
      const boton = document.getElementById('btnCargar');
      const resultado = document.getElementById('resultado');
      const listaCursos = document.getElementById('listaCursos');

      boton.addEventListener('click', async () => {
        try {
          const respuesta = await fetch('/api/escuela');
          const datos = await respuesta.json();

          resultado.textContent = `Nombre: ${datos.nombre}`;
          listaCursos.innerHTML = '';

          datos.cursos.forEach((curso) => {
            const item = document.createElement('li');
            item.textContent = `${curso.nombre} — ${curso.nivel}`;
            listaCursos.appendChild(item);
          });
        } catch (error) {
          resultado.textContent = 'No se pudo cargar la información.';
          console.error(error);
        }
      });
    </script>
  </body>
</html>
